name: 24/7 Pro Stream Bot (OBS Engine)

run-name: "OBS Stream Live Broadcaster"

on:
  workflow_dispatch:
    inputs:
      target_urls:
        description: 'Comma-separated Target URLs (Server1, Server2, Server3)'
        required: true
        type: string
        default: 'https://dadocric.st/player.php?id=starsp3&v=m'
      youtube_stream_key:
        description: 'YouTube Stream Key (Optional)'
        required: false
        type: string
      facebook_stream_key:
        description: 'Facebook Stream Key (Optional)'
        required: false
        type: string
      server_selection:
        description: 'Target Server Button - Type "None" to skip'
        required: true
        type: string
        default: 'None'
      stream_quality:
        description: 'Select Stream Quality'
        required: true
        type: choice
        options:
          - 'Original (1080p Max)'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
        default: 'Original (1080p Max)'
      proxy_engine:
        description: 'Network Proxy Engine (Bypass Blocking)'
        required: true
        type: choice
        options:
          - 'Cloudflare WARP (Recommended)'
          - 'None (Direct GitHub IP)'
        default: 'Cloudflare WARP (Recommended)'
      custom_duration:
        description: 'Exact Duration to run (e.g., 4h 30m, 5h). Type "None" for auto-overlap.'
        required: true
        type: string
        default: 'None'
      overlay_title:
        description: 'Main Match Title'
        required: true
        type: string
        default: 'PAKISTAN VS INDIA T20'
      overlay_timer:
        description: 'Timer in Seconds (e.g., 7320 for 2h 2m)'
        required: true
        type: string
        default: '7320'
      overlay_message:
        description: 'Bottom Alert Message'
        required: true
        type: string
        default: '👇 CHECK THE COMMENT FOR LINK 👇'
      overlay_opacity:
        description: 'Overlay Background Opacity (0.0 to 1.0) - e.g., 0.7'
        required: true
        type: string
        default: '0.7'

permissions:
  contents: write
  actions: write 

jobs:
  stream-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 360 

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies & OBS Studio
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb pulseaudio dbus-x11 obs-studio
          npm install

      - name: Install & Connect Cloudflare WARP (Anti-Block Bypass)
        if: github.event.inputs.proxy_engine == 'Cloudflare WARP (Recommended)'
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect
          sleep 5
          echo "[+] Cloudflare WARP Proxy Shield is UP on Port 40000"

      - name: Run OBS Stream Engine
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          TARGET_URLS: ${{ github.event.inputs.target_urls }}
          YOUTUBE_KEY: ${{ github.event.inputs.youtube_stream_key }}
          FACEBOOK_KEY: ${{ github.event.inputs.facebook_stream_key }}
          SERVER_SELECTION: ${{ github.event.inputs.server_selection }}
          STREAM_QUALITY: ${{ github.event.inputs.stream_quality }}
          PROXY_ENGINE: ${{ github.event.inputs.proxy_engine }}
          CUSTOM_DURATION: ${{ github.event.inputs.custom_duration }}
          OVERLAY_TITLE: ${{ github.event.inputs.overlay_title }}
          OVERLAY_TIMER: ${{ github.event.inputs.overlay_timer }}
          OVERLAY_MESSAGE: ${{ github.event.inputs.overlay_message }}
          OVERLAY_OPACITY: ${{ github.event.inputs.overlay_opacity }}
        run: |
          pulseaudio -D --exit-idle-time=-1
          pacmd load-module module-virtual-sink sink_name=v1
          pacmd set-default-sink v1
          pacmd set-default-source v1.monitor
          
          xvfb-run -s "-screen 0 1920x1080x24 -ac -r -extension RANDR" node stream.js

      - name: Final Leftover Upload
        if: always() 
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "live-stream-logs"
          name: "Live Broadcast Logs"
          body: "Auto updated live stream status."
          files: |
            screenshots/*.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}









































































