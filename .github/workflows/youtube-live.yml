name: Restream YouTube to Facebook (Anti-Bot Bypass)

on:
  workflow_dispatch:
    inputs:
      youtube_link:
        description: 'YouTube Video ya Live Link dalein (e.g., FIFA Gameplay)'
        required: true
        type: string
      fb_stream_key:
        description: 'Facebook Stream Key (FB-1222...)'
        required: true
        type: string
      yt_cookies:
        description: 'Cookies.txt ka sara text yahan paste karein (Optional)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  restream-to-fb:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max limit

    steps:
      - name: Install FFmpeg, Deno and yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg unzip
          # JS warning fix karne ke liye Deno install kar rahe hain
          curl -fsSL https://deno.land/x/install/install.sh | sh
          sudo ln -s /home/runner/.deno/bin/deno /usr/bin/deno
          # yt-dlp install
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Start Broadcast to Facebook
        run: |
          YT_LINK="${{ github.event.inputs.youtube_link }}"
          FB_KEY="${{ github.event.inputs.fb_stream_key }}"

          if [ -z "$FB_KEY" ] || [ -z "$YT_LINK" ]; then
             echo "[❌] ERROR: YouTube Link aur Facebook Stream Key dono zaroori hain!"
             exit 1
          fi

          # GitHub Actions ki formatting bachane ke liye advance method
          if [ -n "${{ github.event.inputs.yt_cookies }}" ]; then
            echo "[*] Using Manual Cookies for bot bypass..."
            cat << 'EOF' > cookies.txt
          ${{ github.event.inputs.yt_cookies }}
          EOF
            COOKIE_CMD="--cookies cookies.txt"
          else
            echo "[*] No cookies provided, trying without them..."
            COOKIE_CMD=""
          fi

          echo "[*] Extracting direct video URL from YouTube..."
          
          # 🔥 Android Spoofing Trick 🔥 (--extractor-args add kiya hai)
          DIRECT_URL=$(yt-dlp $COOKIE_CMD --extractor-args "youtube:player_client=android,web" -g -f "best[height<=1080]/best" "$YT_LINK")

          if [ -z "$DIRECT_URL" ]; then
             echo "[❌] ERROR: YouTube link se stream extract nahi ho saki. Link ya Cookies check karein."
             exit 1
          fi

          echo "[🚀] Direct stream URL mil gayi! Facebook par bhej rahe hain..."
          DEST="rtmps://live-api-s.facebook.com:443/rtmp/$FB_KEY"

          ffmpeg -re -i "$DIRECT_URL" \
            -c:v libx264 -preset veryfast -b:v 4000k -maxrate 4000k -bufsize 8000k \
            -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
            -f flv "$DEST"






































