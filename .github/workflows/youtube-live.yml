name: PKT Auto-Stop Live Stream (Center Big Timer)

on:
  workflow_dispatch:
    inputs:
      stream_key:
        description: 'Apni YouTube Stream Key paste karein'
        required: true
        type: string
      video_file:
        description: 'Apni video file ka naam likhein (e.g., video.mp4)'
        required: true
        default: 'video.mp4'
        type: string
      stop_time:
        description: 'Kab stop karna hai? PKT Time (e.g., 03:00 AM, 11:30 PM)'
        required: true
        default: '12:00 PM'
        type: string
      target_epoch:
        description: '[BOT USE ONLY] Absolute target timestamp'
        default: '0'
        type: string

permissions:
  contents: write
  actions: write

jobs:
  stream-to-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub max limit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and Reliable Fonts
        run: |
          sudo apt-get update
          # 🔥 100% working Ubuntu font install kar rahe hain
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Start Dynamic Auto-Stop Broadcast
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TZ: "Asia/Karachi"
        run: |
          STREAM_KEY="${{ github.event.inputs.stream_key }}"
          VIDEO_FILE="${{ github.event.inputs.video_file }}"
          STOP_TIME="${{ github.event.inputs.stop_time }}"
          TARGET_EPOCH="${{ github.event.inputs.target_epoch }}"

          NOW=$(date +%s)

          # Stop time ki calculation (Today ya Tomorrow)
          if [ "$TARGET_EPOCH" -eq "0" ]; then
            DATE_TODAY=$(date +%Y-%m-%d)
            CALC_EPOCH=$(date -d "$DATE_TODAY $STOP_TIME" +%s)
            
            if [ "$CALC_EPOCH" -le "$NOW" ]; then
              TARGET_EPOCH=$((CALC_EPOCH + 86400))
              echo "[*] Time has passed for today. Scheduled for TOMORROW!"
            else
              TARGET_EPOCH=$CALC_EPOCH
              echo "[*] Scheduled for TODAY!"
            fi
          fi

          TOTAL_SECONDS=$((TARGET_EPOCH - NOW))

          if [ "$TOTAL_SECONDS" -le "0" ]; then
             echo "[🛑] TARGET TIME REACHED! Stream is officially ending."
             exit 0
          fi

          MAX_RUN_TIME=19800 # 5.5 Hours in seconds

          if [ "$TOTAL_SECONDS" -gt "$MAX_RUN_TIME" ]; then
            CURRENT_STREAM_TIME=$MAX_RUN_TIME
            WILL_LOOP="YES"
          else
            CURRENT_STREAM_TIME=$TOTAL_SECONDS
            WILL_LOOP="NO"
          fi

          # 🔥 CENTER ALIGNMENT + BIG DISPLAY + HOURS:MINUTES:SECONDS
          FONT_PATH="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          
          # text='%{pts\:hms}' = Hours:Minutes:Seconds format
          # fontsize=250 = Bada Timer
          # x=(w-tw)/2: y=(h-th)/2 = Screen ka bilkul Center
          DRAWTEXT="drawtext=fontfile=$FONT_PATH: text='%{pts\:hms}': fontcolor=white: fontsize=250: box=1: boxcolor=black@0.6: boxborderw=30: x=(w-tw)/2: y=(h-th)/2"

          echo "[🚀] STARTING BROADCAST..."
          ffmpeg -stream_loop -1 -re -i "$VIDEO_FILE" -vf "$DRAWTEXT" \
            -c:v libx264 -preset veryfast -b:v 4000k -maxrate 4000k -bufsize 8000k \
            -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
            -t $CURRENT_STREAM_TIME \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

          if [ "$WILL_LOOP" == "YES" ]; then
            echo "[🔄] TRIGGERING NEXT RUNNER..."
            gh workflow run "${{ github.workflow }}" \
              -f stream_key="$STREAM_KEY" \
              -f video_file="$VIDEO_FILE" \
              -f stop_time="$STOP_TIME" \
              -f target_epoch="$TARGET_EPOCH"
          fi













